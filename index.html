<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShortLoop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #111118;
      --border: rgba(255,255,255,0.08);
      --accent: #7c3aed;
      --accent2: #a855f7;
      --text: #f1f0f5;
      --muted: #6b6880;
      --red: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    body::before {
      content: '';
      position: fixed;
      top: -150px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 10;
      gap: 16px;
    }
    .logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .logo-name { font-size: 1.05rem; font-weight: 700; }
    .logo-name span { color: var(--accent2); }

    /* Screen picker */
    .screen-picker {
      display: flex; align-items: center; gap: 6px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 5px 10px;
    }
    .sp-label {
      font-size: 0.7rem; color: var(--muted);
      font-weight: 600; letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .sp-btns { display: flex; gap: 3px; }
    .sp-btn {
      width: 26px; height: 26px; border-radius: 7px;
      background: none; border: 1px solid transparent;
      color: var(--muted); font-size: 0.75rem; font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .sp-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .sp-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border-color: transparent;
    }

    .header-count {
      font-size: 0.75rem; color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      padding: 4px 12px; border-radius: 100px;
      white-space: nowrap; flex-shrink: 0;
    }
    .header-count b { color: var(--text); }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      gap: 36px;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
      max-width: 1300px;
      padding: 40px 20px 80px;
      position: relative; z-index: 1;
    }

    /* ── PHONES SECTION ── */
    .phones-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }

    .phones-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: center;
    }

    /* Individual phone */
    .phone-unit { position: relative; flex-shrink: 0; }
    .phone {
      background: linear-gradient(145deg, #1c1c26, #141420);
      border-radius: 40px;
      border: 2px solid rgba(255,255,255,0.1);
      box-shadow: 0 30px 60px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.07);
      padding: 11px;
      position: relative;
      overflow: hidden;
    }
    .phone-notch {
      position: absolute;
      top: 13px; left: 50%; transform: translateX(-50%);
      background: #0a0a0f;
      border-radius: 20px; z-index: 5;
    }
    .video-wrap {
      width: 100%; height: 100%;
      border-radius: 31px;
      overflow: hidden; background: #000;
      position: relative;
    }
    .yt-frame { width: 100%; height: 100%; border: none; display: block; }
    .video-grad {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to top, rgba(0,0,0,0.55), transparent);
      pointer-events: none;
    }
    .empty-msg {
      display: none;
      position: absolute; inset: 0;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 6px;
      color: var(--muted); font-size: 0.75rem; text-align: center;
      padding: 16px;
    }
    .empty-msg .em-icon { font-size: 1.8rem; opacity: 0.3; }

    /* ── CONTROLS ── */
    .controls {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 13px 16px;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      width: 300px;
    }
    .ctrl {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text); font-size: 0.7rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .ctrl:hover { background: rgba(124,58,237,0.25); border-color: rgba(168,85,247,0.5); color: var(--accent2); }
    .ctrl.main {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; font-size: 0.8rem;
    }
    .ctrl.main:hover { opacity: 0.85; }
    .ctrl.muted-off { color: var(--muted); background: rgba(255,255,255,0.04); }

    /* Mute button */
    .mute-big-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 300px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px 20px;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mute-big-btn:hover { background: rgba(255,255,255,0.09); color: var(--text); border-color: rgba(255,255,255,0.18); }
    .mute-big-btn.unmuted {
      background: rgba(124,58,237,0.12);
      border-color: rgba(168,85,247,0.45);
      color: var(--accent2);
    }
    .mute-big-btn.unmuted:hover { background: rgba(124,58,237,0.2); }
    .prog-col { flex: 1; }
    .prog-label { font-size: 0.65rem; color: var(--muted); margin-bottom: 4px; }
    .prog-track { height: 3px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
    #prog-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.1s linear;
    }

    /* ── RIGHT PANEL ── */
    .right { flex: 1; max-width: 340px; display: flex; flex-direction: column; gap: 20px; }

    /* ADD BOX */
    .add-box { background: var(--card); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
    .add-box-head {
      padding: 16px 20px 12px;
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--muted); border-bottom: 1px solid var(--border);
    }
    .add-row { display: flex; padding: 14px 16px; }
    #url-in {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); border-right: none;
      border-radius: 10px 0 0 10px;
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 0.83rem; padding: 10px 14px;
      outline: none; transition: border-color 0.2s;
    }
    #url-in:focus { border-color: rgba(168,85,247,0.5); }
    #url-in::placeholder { color: var(--muted); }
    .add-go {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 0 10px 10px 0;
      color: #fff; font-family: 'Inter', sans-serif;
      font-size: 0.83rem; font-weight: 600; padding: 10px 18px;
      cursor: pointer; white-space: nowrap; transition: opacity 0.2s;
    }
    .add-go:hover { opacity: 0.85; }
    .add-status { padding: 0 16px 12px; font-size: 0.73rem; min-height: 20px; }
    .add-status.ok  { color: #22c55e; }
    .add-status.err { color: var(--red); }

    /* Delay picker */
    .delay-box { background: var(--card); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
    .delay-head {
      padding: 14px 20px 10px;
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--muted); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .delay-current {
      font-size: 0.72rem; font-weight: 600;
      color: var(--accent2);
      background: rgba(124,58,237,0.12);
      border-radius: 6px; padding: 2px 8px;
    }
    .delay-body { padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
    .delay-field { display: flex; flex-direction: column; gap: 5px; flex: 1; }
    .delay-label { font-size: 0.68rem; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; }
    .delay-in {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 0.88rem; font-weight: 700;
      padding: 8px 10px; outline: none;
      transition: border-color 0.2s;
      text-align: center;
    }
    .delay-in:focus { border-color: rgba(168,85,247,0.5); }
    .delay-sep { font-size: 0.8rem; color: var(--muted); padding-top: 18px; flex-shrink: 0; }
    .delay-unit { font-size: 0.72rem; color: var(--muted); text-align: center; margin-top: 2px; }

    /* VIDEO LIST */
    .vid-list-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; overflow: hidden; flex: 1;
    }
    .vid-list-head {
      padding: 16px 20px 12px;
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--muted); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .clear-btn {
      font-size: 0.7rem; color: var(--muted);
      background: none; border: none; cursor: pointer;
      padding: 2px 6px; border-radius: 6px; transition: color 0.15s;
    }
    .clear-btn:hover { color: var(--red); }
    #vid-list {
      max-height: 320px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .vid-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .vid-row:last-child { border-bottom: none; }
    .vid-row:hover { background: rgba(255,255,255,0.03); }
    .vid-row.now-playing { background: rgba(124,58,237,0.08); }
    .vid-thumb {
      width: 40px; height: 40px; flex-shrink: 0;
      border-radius: 8px; overflow: hidden;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    }
    .vid-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .vid-id {
      flex: 1; font-size: 0.78rem;
      font-family: monospace; color: var(--muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .vid-row.now-playing .vid-id { color: var(--accent2); }
    .now-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent2); box-shadow: 0 0 6px var(--accent);
      flex-shrink: 0; display: none;
    }
    .vid-row.now-playing .now-dot { display: block; }
    .del-btn {
      width: 26px; height: 26px; border-radius: 6px;
      background: none; border: 1px solid transparent;
      color: rgba(255,255,255,0.2); font-size: 0.75rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .del-btn:hover { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.3); color: var(--red); }
    .play-btn-small {
      width: 26px; height: 26px; border-radius: 6px;
      background: none; border: 1px solid transparent;
      color: rgba(255,255,255,0.2); font-size: 0.7rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .play-btn-small:hover { background: rgba(124,58,237,0.15); border-color: rgba(168,85,247,0.3); color: var(--accent2); }
    .empty-list { padding: 32px 20px; text-align: center; color: var(--muted); font-size: 0.82rem; line-height: 1.7; }

    footer {
      width: 100%; padding: 20px 32px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem; color: var(--muted);
      display: flex; justify-content: space-between;
      position: relative; z-index: 1; margin-top: auto;
    }

    @media (max-width: 800px) {
      .layout { flex-direction: column; align-items: center; padding-bottom: 80px; }
      .right { max-width: 100%; width: 100%; }
      header { padding: 12px 16px; }
      .sp-label { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">▶</div>
    <div class="logo-name">Short<span>Loop</span></div>
  </div>

  <div class="screen-picker">
    <span class="sp-label">Screens</span>
    <div class="sp-btns" id="sp-btns">
      <button class="sp-btn active" data-n="1">1</button>
      <button class="sp-btn" data-n="2">2</button>
      <button class="sp-btn" data-n="3">3</button>
      <button class="sp-btn" data-n="4">4</button>
      <button class="sp-btn" data-n="5">5</button>
    </div>
  </div>

  <div class="header-count"><b id="hcount">0</b> videos</div>
</header>

<div class="layout">

  <!-- PHONES + CONTROLS -->
  <div class="phones-section">
    <div class="phones-row" id="phones-row"></div>
    <div class="controls">
      <button class="ctrl" onclick="prevV()" title="Previous">&#9664;</button>
      <button class="ctrl main" id="pause-btn" onclick="togglePause()" title="Pause">&#10074;&#10074;</button>
      <button class="ctrl" onclick="nextV()" title="Next">&#9654;</button>
      <div class="prog-col">
        <div class="prog-label" id="prog-label">Next in —</div>
        <div class="prog-track"><div id="prog-fill"></div></div>
      </div>
    </div>
    <button class="mute-big-btn" id="mute-btn" onclick="toggleMute()">
      <span id="mute-icon">🔇</span>
      <span id="mute-label">Muted — tap to unmute</span>
    </button>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="add-box">
      <div class="add-box-head">Add a Video</div>
      <div class="add-row">
        <input id="url-in" type="text" placeholder="Paste any YouTube URL here…"
          onkeydown="if(event.key==='Enter') doAdd()" />
        <button class="add-go" onclick="doAdd()">Add</button>
      </div>
      <div class="add-status" id="add-status"></div>
    </div>
    <div class="delay-box">
      <div class="delay-head">
        <span>Random Delay Range</span>
        <span class="delay-current" id="delay-current">5s – 20s</span>
      </div>
      <div class="delay-body">
        <div class="delay-field">
          <div class="delay-label">MIN</div>
          <input class="delay-in" id="delay-min" type="number" min="1" max="120" value="5"
            onchange="updateDelay()" />
          <div class="delay-unit">seconds</div>
        </div>
        <div class="delay-sep">→</div>
        <div class="delay-field">
          <div class="delay-label">MAX</div>
          <input class="delay-in" id="delay-max" type="number" min="1" max="120" value="20"
            onchange="updateDelay()" />
          <div class="delay-unit">seconds</div>
        </div>
      </div>
    </div>

    <div class="vid-list-box">
      <div class="vid-list-head">
        <span>Playlist</span>
        <button class="clear-btn" onclick="clearAll()">Clear all</button>
      </div>
      <div id="vid-list"></div>
    </div>
  </div>

</div>

<footer>
  <span>© 2025 ShortLoop</span>
  <span id="footer-delay">Auto-shuffled · random delay</span>
</footer>

<script>
  const STORE   = "sl_urls";
  const SCKEY   = "sl_screens";
  const DMIN_KEY = "sl_dmin";
  const DMAX_KEY = "sl_dmax";

  /* phone dimensions [w, h] per screen count */
  const PHONE_SIZES = {
    1: [280, 560],
    2: [215, 430],
    3: [175, 350],
    4: [145, 290],
    5: [120, 240],
  };

  /* notch size [w, h] per screen count */
  const NOTCH_SIZES = {
    1: [80, 24],
    2: [62, 20],
    3: [52, 17],
    4: [44, 15],
    5: [38, 13],
  };

  /* ── Delay range (seconds) ── */
  let minSec = Math.max(1, parseInt(localStorage.getItem(DMIN_KEY) || "5",  10));
  let maxSec = Math.max(1, parseInt(localStorage.getItem(DMAX_KEY) || "20", 10));

  function randDelay() {
    const lo = Math.min(minSec, maxSec);
    const hi = Math.max(minSec, maxSec);
    return (Math.floor(Math.random() * (hi - lo + 1)) + lo) * 1000;
  }

  function updateDelay() {
    const minIn = document.getElementById("delay-min");
    const maxIn = document.getElementById("delay-max");
    minSec = Math.max(1, Math.min(120, parseInt(minIn.value) || 1));
    maxSec = Math.max(1, Math.min(120, parseInt(maxIn.value) || 1));
    minIn.value = minSec;
    maxIn.value = maxSec;
    localStorage.setItem(DMIN_KEY, minSec);
    localStorage.setItem(DMAX_KEY, maxSec);
    const lo = Math.min(minSec, maxSec);
    const hi = Math.max(minSec, maxSec);
    document.getElementById("delay-current").textContent = lo === hi ? `${lo}s fixed` : `${lo}s – ${hi}s`;
  }

  /* ── State ── */
  let screenCount = Math.min(5, Math.max(1, parseInt(localStorage.getItem(SCKEY) || "1", 10)));
  let DELAY       = randDelay();
  let ids         = load();
  let shuffled    = shuffle([...ids]);
  let cur         = 0;
  let paused      = false;
  let muted       = true;
  let timer       = null;
  let raf         = null;
  let elapsed     = 0;
  let t0          = null;

  /* ── Storage ── */
  function load()    { try { return JSON.parse(localStorage.getItem(STORE)) || []; } catch { return []; } }
  function save(arr) { try { localStorage.setItem(STORE, JSON.stringify(arr)); }    catch {} }

  /* ── Extract YouTube ID ── */
  function getId(raw) {
    const s = (raw || "").trim();
    if (!s) return null;
    const ok = v => /^[A-Za-z0-9_-]{11}$/.test(v);
    try {
      const u = new URL(s.startsWith("http") ? s : "https://" + s);
      const h = u.hostname.replace(/^(www\.|m\.|music\.)/, "");
      if (h === "youtu.be") {
        const seg = u.pathname.slice(1).split(/[?#&/]/)[0];
        if (ok(seg)) return seg;
      }
      if (h === "youtube.com") {
        const sm = u.pathname.match(/\/shorts\/([A-Za-z0-9_-]{11})/);
        if (sm) return sm[1];
        const em = u.pathname.match(/\/(?:embed|v)\/([A-Za-z0-9_-]{11})/);
        if (em) return em[1];
        const v = u.searchParams.get("v");
        if (v && ok(v)) return v;
      }
    } catch (_) {}
    for (const p of [
      /[?&]v=([A-Za-z0-9_-]{11})/,
      /\/shorts\/([A-Za-z0-9_-]{11})/,
      /youtu\.be\/([A-Za-z0-9_-]{11})/,
      /\/embed\/([A-Za-z0-9_-]{11})/,
    ]) { const m = s.match(p); if (m) return m[1]; }
    if (ok(s)) return s;
    return null;
  }

  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  /* ── DOM refs ── */
  const phonesRow  = document.getElementById("phones-row");
  const fillEl     = document.getElementById("prog-fill");
  const lblEl      = document.getElementById("prog-label");
  const pauseBtn   = document.getElementById("pause-btn");
  const muteBtn    = document.getElementById("mute-btn");
  const listEl     = document.getElementById("vid-list");
  const statusEl   = document.getElementById("add-status");
  const hcount     = document.getElementById("hcount");
  const footerDel  = document.getElementById("footer-delay");

  /* ── Build phone elements ── */
  function buildPhones() {
    phonesRow.innerHTML = "";
    const [pw, ph] = PHONE_SIZES[screenCount];
    const [nw, nh] = NOTCH_SIZES[screenCount];
    const radius   = Math.round(pw * 0.14) + "px";

    for (let k = 0; k < screenCount; k++) {
      const unit = document.createElement("div");
      unit.className = "phone-unit";

      unit.innerHTML = `
        <div class="phone" style="width:${pw}px;height:${ph}px;border-radius:${radius};">
          <div class="phone-notch" style="width:${nw}px;height:${nh}px;top:11px;"></div>
          <div class="video-wrap" style="border-radius:calc(${radius} - 4px);">
            <iframe class="yt-frame" id="frame-${k}"
              allow="autoplay; encrypted-media" allowfullscreen></iframe>
            <div class="empty-msg" id="empty-${k}">
              <div class="em-icon">📭</div>
              <span>Add videos<br>to get started</span>
            </div>
            <div class="video-grad"></div>
          </div>
        </div>`;
      phonesRow.appendChild(unit);
    }
  }

  /* ── Get all frames ── */
  function getFrames() {
    return Array.from({ length: screenCount }, (_, k) => document.getElementById(`frame-${k}`));
  }

  /* ── Send postMessage to all frames ── */
  function sendAll(cmd) {
    getFrames().forEach(f => {
      try { f.contentWindow.postMessage(JSON.stringify({ event: "command", func: cmd, args: [] }), "*"); } catch (_) {}
    });
  }

  /* ── Mute toggle ── */
  function toggleMute() {
    muted = !muted;
    if (muted) {
      sendAll("mute");
      document.getElementById("mute-icon").textContent  = "🔇";
      document.getElementById("mute-label").textContent = "Muted — tap to unmute";
      muteBtn.classList.remove("unmuted");
    } else {
      sendAll("unMute");
      document.getElementById("mute-icon").textContent  = "🔊";
      document.getElementById("mute-label").textContent = "Sound on — tap to mute";
      muteBtn.classList.add("unmuted");
    }
  }

  /* ── Play ── */
  function play(i) {
    if (shuffled.length === 0) {
      getFrames().forEach((f, k) => {
        f.src = "";
        f.style.display = "none";
        const em = document.getElementById(`empty-${k}`);
        if (em) em.style.display = "flex";
      });
      lblEl.textContent = "No videos";
      fillEl.style.width = "0%";
      footerDel.textContent = "Auto-shuffled · random delay";
      clearTimeout(timer); cancelAnimationFrame(raf);
      renderList(); return;
    }

    cur = ((i % shuffled.length) + shuffled.length) % shuffled.length;
    elapsed = 0;
    DELAY = randDelay();
    footerDel.textContent = `Auto-shuffled · ${DELAY / 1000}s this round`;

    const muteParam = muted ? 1 : 0;
    getFrames().forEach((f, k) => {
      const idx = (cur + k) % shuffled.length;
      const id  = shuffled[idx];
      f.style.display = "block";
      const em = document.getElementById(`empty-${k}`);
      if (em) em.style.display = "none";
      f.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=${muteParam}&loop=1&playlist=${id}&controls=0&rel=0&modestbranding=1&enablejsapi=1`;
    });

    renderList();
    if (!paused) startTimer();
  }

  function startTimer() {
    clearTimeout(timer); cancelAnimationFrame(raf);
    t0 = performance.now() - elapsed;
    function tick(now) {
      elapsed = now - t0;
      const pct  = Math.min((elapsed / DELAY) * 100, 100);
      const secs = Math.max(0, Math.ceil((DELAY - elapsed) / 1000));
      fillEl.style.width = pct + "%";
      lblEl.textContent  = `Next in ${secs}s`;
      if (elapsed < DELAY) raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);
    timer = setTimeout(() => nextV(), DELAY - elapsed);
  }

  function stopTimer() {
    clearTimeout(timer); cancelAnimationFrame(raf);
    lblEl.textContent = "Paused";
  }

  function nextV() { play(cur + 1); }
  function prevV() { play(cur - 1); }

  function togglePause() {
    paused = !paused;
    pauseBtn.innerHTML = paused ? "&#9654;" : "&#10074;&#10074;";
    paused ? stopTimer() : startTimer();
  }

  /* ── Screen count picker ── */
  document.getElementById("sp-btns").addEventListener("click", e => {
    const btn = e.target.closest(".sp-btn");
    if (!btn) return;
    const n = parseInt(btn.dataset.n, 10);
    if (n === screenCount) return;
    screenCount = n;
    localStorage.setItem(SCKEY, n);
    document.querySelectorAll(".sp-btn").forEach(b =>
      b.classList.toggle("active", parseInt(b.dataset.n, 10) === n)
    );
    buildPhones();
    elapsed = 0;
    play(cur);
  });

  /* ── Add video ── */
  function doAdd() {
    const raw = document.getElementById("url-in").value.trim();
    const id  = getId(raw);
    statusEl.className = "";
    if (!id) {
      statusEl.className = "add-status err";
      statusEl.textContent = "✕ Couldn't find a YouTube ID — paste the full URL from your browser";
      return;
    }
    if (ids.includes(id)) {
      statusEl.className = "add-status err";
      statusEl.textContent = "✕ Already in playlist";
      return;
    }
    ids.push(id); save(ids);
    shuffled = shuffle([...ids]);
    hcount.textContent = ids.length;
    document.getElementById("url-in").value = "";
    statusEl.className = "add-status ok";
    statusEl.textContent = `✓ Added — ${ids.length} video${ids.length !== 1 ? "s" : ""} in playlist`;
    if (ids.length === 1) { play(0); }
    else { renderList(); }
    setTimeout(() => { statusEl.textContent = ""; statusEl.className = ""; }, 3000);
  }

  /* ── Remove ── */
  function remove(id) {
    const nowIds = playingIds();
    ids = ids.filter(v => v !== id); save(ids);
    shuffled = shuffle([...ids]);
    hcount.textContent = ids.length;
    if (ids.length === 0 || nowIds.has(id)) { play(0); }
    else { renderList(); }
  }

  /* ── Clear all ── */
  function clearAll() {
    if (!ids.length) return;
    if (!confirm("Remove all videos from the playlist?")) return;
    ids = []; save(ids);
    shuffled = []; hcount.textContent = 0;
    play(0);
  }

  /* ── Play specific ── */
  function playId(id) {
    const i = shuffled.indexOf(id);
    if (i !== -1) { elapsed = 0; play(i); }
  }

  /* ── Currently playing IDs ── */
  function playingIds() {
    const s = new Set();
    if (!shuffled.length) return s;
    for (let k = 0; k < screenCount; k++) {
      s.add(shuffled[(cur + k) % shuffled.length]);
    }
    return s;
  }

  /* ── Render list ── */
  function renderList() {
    if (ids.length === 0) {
      listEl.innerHTML = `<div class="empty-list">No videos yet.<br/>Paste a YouTube URL above.</div>`;
      return;
    }
    const nowIds = playingIds();
    listEl.innerHTML = "";
    ids.forEach(id => {
      const isNow = nowIds.has(id);
      const row = document.createElement("div");
      row.className = "vid-row" + (isNow ? " now-playing" : "");
      row.innerHTML = `
        <div class="vid-thumb">
          <img src="https://i.ytimg.com/vi/${id}/default.jpg" loading="lazy" onerror="this.style.opacity=0">
        </div>
        <div class="now-dot"></div>
        <div class="vid-id">${id}</div>
        <button class="play-btn-small" onclick="playId('${id}')" title="Play now">▶</button>
        <button class="del-btn" onclick="remove('${id}')" title="Remove">✕</button>
      `;
      listEl.appendChild(row);
    });
  }

  /* ── Keyboard ── */
  document.addEventListener("keydown", e => {
    if (e.target.tagName === "INPUT") return;
    if (e.key === " ")          { e.preventDefault(); togglePause(); }
    if (e.key === "ArrowRight") nextV();
    if (e.key === "ArrowLeft")  prevV();
    if (e.key === "m" || e.key === "M") toggleMute();
  });

  /* ── Init ── */
  // Restore screen picker
  document.querySelectorAll(".sp-btn").forEach(b =>
    b.classList.toggle("active", parseInt(b.dataset.n, 10) === screenCount)
  );
  // Restore delay inputs
  const minInEl = document.getElementById("delay-min");
  const maxInEl = document.getElementById("delay-max");
  minInEl.value = minSec;
  maxInEl.value = maxSec;
  const lo0 = Math.min(minSec, maxSec), hi0 = Math.max(minSec, maxSec);
  document.getElementById("delay-current").textContent = lo0 === hi0 ? `${lo0}s fixed` : `${lo0}s – ${hi0}s`;

  hcount.textContent = ids.length;
  buildPhones();
  renderList();
  play(0);
</script>
</body>
</html>
